<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Details</title>
    <link rel="stylesheet" href="../css/global.css">
    <style>
        .detail-group { margin-bottom: 20px; }
        .detail-label { font-weight: bold; color: #7f8c8d; font-size: 14px; margin-bottom: 5px; text-transform: uppercase;}
        .detail-value { font-size: 16px; color: #333; }
        .desc-box { background: #f9f9f9; padding: 15px; border-radius: 4px; border: 1px solid #eee; margin-top: 5px; white-space: pre-wrap;}
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 4px; color: white; font-weight: bold; font-size: 14px;}
        .status-open { background: #e74c3c; }
        .status-in_progress { background: #f39c12; }
        .status-resolved { background: #27ae60; }
        .back-btn { margin-bottom: 20px; display: inline-block; color: #3498db; text-decoration: none; font-weight: bold; font-size: 16px;}
        .back-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="layout">
        <nav class="sidebar">
            <h2>Menu</h2>
            <a href="#" id="nav-dashboard">Dashboard</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
        <main class="content">
            <a href="javascript:history.back()" class="back-btn">← Back to List</a>
            <header>
                <h1>Ticket Details</h1>
            </header>
            
            <div class="card" id="ticket-detail-container">
                <p>Loading ticket details...</p>
                </div>

            <div class="card" id="admin-actions" style="display: none; background: #f0f8ff; border: 1px solid #cce7ff;">
                <h3 style="margin-bottom: 15px;">Update Status</h3>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <select id="update-status-dropdown" style="padding: 10px; border-radius: 4px; border: 1px solid #ccc; flex-grow: 1; max-width: 300px;">
                        <option value="open">Open</option>
                        <option value="in_progress">In Progress</option>
                        <option value="resolved">Resolved</option>
                    </select>
                    <button onclick="saveTicketStatus()" style="padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Save Status</button>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/tickets.js"></script>
    <script>
        checkAuth();
        
        // Dynamically set the "Dashboard" link based on user role
        const role = localStorage.getItem('userRole');
        const navLink = document.getElementById('nav-dashboard');
        if(role === 'Staff') navLink.href = 'staff-dashboard.html';
        if(role === 'Manager') navLink.href = 'manager-dashboard.html';
        if(role === 'Admin') navLink.href = 'admin-dashboard.html';

        // Show update actions only to Admin/Manager
        if(role === 'Admin' || role === 'Manager') {
            document.getElementById('admin-actions').style.display = 'block';
        }

        // Load the specific ticket data
        loadTicketDetail();
    </script>
</body>
</html>
