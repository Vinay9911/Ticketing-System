<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset & Ticketing System - Login</title>
    <link rel="stylesheet" href="css/global.css">
    <script src="js/auth.js"></script>
    <style>
        .login-container { max-width: 400px; margin: 100px auto; text-align: center; font-family: Arial, sans-serif; }
        .login-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Simulated Main App Login</h2>
        <p>Select your role to generate the local authentication context.</p>
        
        <button class="login-btn" onclick="login('admin', 1, 'Admin User')">Login as Admin</button>
        <button class="login-btn" onclick="login('manager', 2, 'Manager User')">Login as Manager</button>
        <button class="login-btn" onclick="login('staff', 3, 'Staff User')">Login as Staff</button>
    </div>
</body>
</html>
