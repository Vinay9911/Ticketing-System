<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login - Ticketing System</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/forms.css">
</head>
<body class="login-bg">
    <div class="login-box">
        <h2>System Login</h2>
        <p>Select your role:</p>
        <button class="btn btn-admin" onclick="login('Admin', 'Alice Admin')">Login as Admin</button>
        <button class="btn btn-manager" onclick="login('Manager', 'Mike Manager')">Login as Manager</button>
        <button class="btn btn-staff" onclick="login('Staff', 'Sam Staff')">Login as Staff</button>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
